name: Release

on:
  push:
    tags: ['v*']

jobs:
  build-linux-x86_64:
    name: linux-x86_64 (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - manylinux2014_x86_64
          - manylinux_2_28_x86_64
          - manylinux_2_34_x86_64
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Build wheel via Docker
        run: |
          docker build \
            --build-arg BASE_IMAGE=quay.io/pypa/${{ matrix.image }} \
            -t builder \
            .
          mkdir -p wheelhouse
          docker run --rm \
            -v "${{ github.workspace }}/wheelhouse:/wheelhouse" \
            builder

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-x86_64-${{ matrix.image }}
          path: wheelhouse/*.whl

  build-linux-aarch64:
    name: linux-aarch64 (${{ matrix.image }})
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        image:
          - manylinux2014_aarch64
          - manylinux_2_28_aarch64
          - manylinux_2_34_aarch64
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Build wheel via Docker
        run: |
          docker build \
            --build-arg BASE_IMAGE=quay.io/pypa/${{ matrix.image }} \
            -t builder \
            .
          mkdir -p wheelhouse
          docker run --rm \
            -v "${{ github.workspace }}/wheelhouse:/wheelhouse" \
            builder

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-aarch64-${{ matrix.image }}
          path: wheelhouse/*.whl

  build-windows-x86_64:
    name: windows-x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build tools
        run: pip install cmake scikit-build-core

      - name: Build wheel
        run: pip wheel . --no-deps -w wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x86_64
          path: wheelhouse/*.whl

  build-windows-arm64:
    name: windows-arm64
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build tools
        run: pip install cmake scikit-build-core

      - name: Build wheel
        run: pip wheel . --no-deps -w wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-arm64
          path: wheelhouse/*.whl

  build-macos-arm64:
    name: macos-arm64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build tools
        run: pip install cmake scikit-build-core

      - name: Build wheel
        run: pip wheel . --no-deps -w wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-arm64
          path: wheelhouse/*.whl

  build-macos-x86_64:
    name: macos-x86_64
    runs-on: macos-26-intel
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build tools
        run: pip install cmake scikit-build-core

      - name: Build wheel
        run: pip wheel . --no-deps -w wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-x86_64
          path: wheelhouse/*.whl

  release:
    name: Create Release & Publish to PyPI
    needs:
      [build-linux-x86_64, build-linux-aarch64, build-windows-x86_64, build-windows-arm64, build-macos-arm64, build-macos-x86_64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    environment: release
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
