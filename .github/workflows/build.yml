name: Build wheels

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-linux:
    name: ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - manylinux2014_x86_64
          - manylinux_2_28_x86_64
          - manylinux_2_34_x86_64
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Build, install, and run tests
        run: |
          pip install cmake scikit-build-core
          pip install .
          pip install pytest
          python -m pytest tests/ -v

      - name: Build wheel via Docker
        run: |
          docker build \
            --build-arg BASE_IMAGE=quay.io/pypa/${{ matrix.image }} \
            -t builder \
            .
          mkdir -p wheelhouse
          docker run --rm \
            -v "${{ github.workspace }}/wheelhouse:/wheelhouse" \
            builder

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.image }}
          path: wheelhouse/*.whl

  build-linux-aarch64:
    name: ${{ matrix.image }}
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        image:
          - manylinux2014_aarch64
          - manylinux_2_28_aarch64
          - manylinux_2_34_aarch64
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Build, install, and run tests
        run: |
          pip install cmake scikit-build-core
          pip install .
          pip install pytest
          python -m pytest tests/ -v

      - name: Build wheel via Docker
        run: |
          docker build \
            --build-arg BASE_IMAGE=quay.io/pypa/${{ matrix.image }} \
            -t builder \
            .
          mkdir -p wheelhouse
          docker run --rm \
            -v "${{ github.workspace }}/wheelhouse:/wheelhouse" \
            builder

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.image }}
          path: wheelhouse/*.whl

  build-windows-x86_64:
    name: windows-x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build tools
        run: pip install cmake scikit-build-core

      - name: Build, install, and run tests
        run: |
          pip install .
          pip install pytest
          python -m pytest tests/ -v

      - name: Build wheel
        run: pip wheel . --no-deps -w wheelhouse

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x86_64
          path: wheelhouse/*.whl

  build-windows-arm64:
    name: windows-arm64
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install cmake scikit-build-core

      - name: Build, install, and run tests
        run: |
          pip install .
          pip install pytest
          python -m pytest tests/ -v

      - name: Build wheel
        run: pip wheel . --no-deps -w wheelhouse

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-arm64
          path: wheelhouse/*.whl

  build-macos-arm64:
    name: macos-arm64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build tools
        run: pip install cmake scikit-build-core

      - name: Build, install, and run tests
        run: |
          pip install .
          pip install pytest
          python -m pytest tests/ -v

      - name: Build wheel
        run: pip wheel . --no-deps -w wheelhouse

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-arm64
          path: wheelhouse/*.whl

  build-macos-x86_64:
    name: macos-x86_64
    runs-on: macos-26-intel
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build tools
        run: pip install cmake scikit-build-core

      - name: Build, install, and run tests
        run: |
          pip install .
          pip install pytest
          python -m pytest tests/ -v

      - name: Build wheel
        run: pip wheel . --no-deps -w wheelhouse

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-x86_64
          path: wheelhouse/*.whl

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install package
        run: |
          pip install cmake scikit-build-core
          pip install -e .

      - name: Run tests with coverage
        run: pip install pytest-cov && python -m pytest tests/ --cov=python_fma --cov-report=json

      - name: Generate badge
        run: |
          mkdir -p badges
          pip install anybadge
          total=$(python -c "import json; d=json.load(open('coverage.json')); print(f'{float(d[\"totals\"][\"percent_covered_display\"]):.0f}')")
          anybadge --value="$total" --file=badges/coverage.svg --label=coverage --suffix=% --color=green --overwrite

      - name: Upload coverage badge
        uses: actions/upload-artifact@v4
        with:
          name: coverage-badge
          path: badges/
